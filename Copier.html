<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Splitter & Copier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ซ่อน Scrollbar แต่ยัง Scroll ได้ เพื่อความสวยงามของ UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <div class="flex items-center space-x-3 pb-4 border-b border-gray-200">
            <div class="bg-[#1a1b23] text-white p-2 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold">Code Separator</h1>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <label for="rawInput" class="block text-sm font-semibold text-gray-700 mb-2">1. วางข้อความหรือโค้ด (Raw Text)</label>
            <textarea id="rawInput" rows="4" 
                class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#1a1b23] focus:border-transparent transition-all resize-none"
                placeholder="Enter your codes here..."></textarea>
            
            <div class="mt-4 flex justify-end">
                <button id="processBtn" class="bg-[#1a1b23] hover:bg-black text-white px-6 py-2.5 rounded-lg font-medium transition-colors shadow-md">
                    Process Codes
                </button>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-lg font-bold text-gray-800">2. ผลลัพธ์ (คลิกเพื่อ Copy)</h2>
                <span id="countDisplay" class="text-sm text-gray-500 font-medium">Total: 0 codes</span>
            </div>
            
            <div id="outputGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
        </div>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', processText);

        function processText() {
            const rawText = document.getElementById('rawInput').value;
            const outputGrid = document.getElementById('outputGrid');
            const countDisplay = document.getElementById('countDisplay');
            
            // เคลียร์ผลลัพธ์เก่า
            outputGrid.innerHTML = '';

            // ใช้ Regular Expression (/\s+/) ในการแยกคำด้วยช่องว่าง (Space), แท็บ (Tab), หรือขึ้นบรรทัดใหม่ (Newline)
            // .filter(Boolean) เพื่อกรองค่าที่เป็นช่องว่างเปล่าๆ ทิ้งไป
            const codes = rawText.split(/\s+/).filter(Boolean);
            
            countDisplay.textContent = `Total: ${codes.length} codes`;

            if (codes.length === 0) {
                outputGrid.innerHTML = '<p class="text-gray-500 col-span-full">No codes found. Please enter text above.</p>';
                return;
            }

            // สร้าง Card สำหรับแต่ละโค้ด
            codes.forEach(code => {
                const card = document.createElement('div');
                // จัด UI Card ให้เป็นสีเข้มตาม Reference Image
                card.className = 'bg-[#1a1b23] rounded-xl p-4 flex justify-between items-center shadow-lg transform transition-transform hover:scale-[1.02]';
                
                const textSpan = document.createElement('span');
                textSpan.className = 'text-white font-mono text-sm truncate pr-2';
                // Security First: ใช้ textContent แทน innerHTML ป้องกัน XSS Attack หากเผลอวางโค้ดอันตราย
                textSpan.textContent = code;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'bg-white text-[#1a1b23] text-xs font-bold py-1.5 px-3 rounded-md hover:bg-gray-200 transition-colors flex-shrink-0';
                copyBtn.textContent = 'COPY';
                
                // ระบบ Copy ลง Clipboard
                copyBtn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(code);
                        // UX Feedback: เปลี่ยนข้อความปุ่มเพื่อบอกผู้ใช้ว่าก็อปปี้สำเร็จแล้ว
                        const originalText = copyBtn.textContent;
                        copyBtn.textContent = 'COPIED!';
                        copyBtn.classList.replace('bg-white', 'bg-green-400');
                        
                        setTimeout(() => {
                            copyBtn.textContent = originalText;
                            copyBtn.classList.replace('bg-green-400', 'bg-white');
                        }, 1500);
                    } catch (err) {
                        console.error('Failed to copy text: ', err);
                        alert('ไม่สามารถ Copy ได้ กรุณาลองใหม่อีกครั้ง');
                    }
                };

                card.appendChild(textSpan);
                card.appendChild(copyBtn);
                outputGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
